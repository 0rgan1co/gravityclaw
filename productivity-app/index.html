<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChronoTask - Productividad Élite</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <!-- Iconos RemixIcon -->
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
</head>
<body>
    <main class="app-container glass-panel">
        <header>
            <h1><i class="ri-timer-flash-line"></i> ChronoTask</h1>
            <p>Rastrea tu tiempo. Domina tu día.</p>
        </header>

        <section class="input-section">
            <input type="text" id="task-input" placeholder="¿Qué necesitas hacer hoy?" autocomplete="off">
            <button id="add-task-btn"><i class="ri-add-line"></i> Agregar</button>
        </section>

        <section class="tasks-section">
            <ul id="task-list">
                <!-- Las tareas se inyectarán aquí dinámicamente -->
            </ul>
        </section>
        
        <footer>
            <p>Creado en modo Superpowers ✨</p>
        </footer>
    </main>
    <script src="app.js"></script>
</body>
</html>
